# AiStock Nginx 站点配置
# 安装: sudo cp deploy/nginx/aistock.conf /etc/nginx/sites-available/aistock

upstream aistock_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name aistock.example.com;

    # 生产 HTTPS：取消注释并配置证书
    # listen 443 ssl http2;
    # ssl_certificate     /etc/letsencrypt/live/aistock.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/aistock.example.com/privkey.pem;

    client_max_body_size 50m;

    root /opt/aistock/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://aistock_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location /docs {
        proxy_pass http://aistock_api/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://aistock_api/openapi.json;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
