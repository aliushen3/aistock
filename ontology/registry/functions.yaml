version: "1.0.0"

functions:
  calcBottleneckHint:
    display_name: 瓶颈提示分
    applies_to: [Product]
    inputs: [product_id]
    output: ScoreCard
    implementation: calc_bottleneck_hint
    disclaimer: 辅助排序提示，非投资决策

  serenityReverseTrace:
    display_name: Serenity逆向溯源
    applies_to: [Sector]
    inputs: [sector_id]
    output: TracePathList
    implementation: serenity_reverse_trace

  buildFusionPool:
    display_name: 双逻辑融合候选池
    applies_to: [Sector]
    inputs: [sector_id, mode]
    output: CandidateList
    implementation: build_fusion_pool

  generateReportDraft:
    display_name: GraphRAG报告草稿
    applies_to: [Sector]
    inputs: [sector_id, mode]
    output: ResearchReport
    implementation: generate_report_draft

  edgeSignal:
    display_name: 预期差信号（闸一）
    applies_to: [Company]
    inputs: [stock_code]
    output: EdgeAssessment
    implementation: edge_signal
    disclaimer: 预期差为辅助提示，不构成投资建议

  valueCapture:
    display_name: 价值捕获研判（闸二）
    applies_to: [Company]
    inputs: [product_id, company_code]
    output: ValueCaptureCard
    implementation: value_capture
    disclaimer: 价值捕获为辅助提示，不构成投资建议

  generateBearCase:
    display_name: 看空论点生成（闸三，独立检索）
    applies_to: [Sector]
    inputs: [sector_id, mode]
    output: BearCaseList
    implementation: generate_bear_case
    disclaimer: 看空论点供等强对抗，不构成投资建议
