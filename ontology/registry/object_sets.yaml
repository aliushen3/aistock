version: "1.0.0"

object_sets:
  BetaConfirmedSectors:
    object_type: Sector
    filter:
      status: beta_confirmed

  BottleneckProducts:
    object_type: Product
    filter:
      bottleneck_status:
        in: [bottleneck_hint, bottleneck_confirmed]

  PendingCandidates:
    object_type: CandidatePoolEntry
    filter:
      status: pending

  P0FusionCandidates:
    object_type: CandidatePoolEntry
    filter:
      mode: fusion
      priority: P0
      status: pending

  ProposedSectorRecommendations:
    object_type: SectorRecommendation
    filter:
      status: proposed

  ProposedBottleneckRecommendations:
    object_type: BottleneckRecommendation
    filter:
      status: proposed

  ProposedSerenityRecommendations:
    object_type: SerenityRecommendation
    filter:
      status: proposed

  UnrebuttedBearCases:
    object_type: BearCase
    filter:
      severity: high
      rebuttal_status: unrebutted

  EasingBottlenecks:
    object_type: Product
    filter:
      bottleneck_status:
        in: [bottleneck_easing, bottleneck_expired]

  StaleKnowledge:
    object_type: Product
    filter:
      freshness: stale
